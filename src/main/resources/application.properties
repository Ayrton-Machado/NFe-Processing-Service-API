# Configuração de AMBIENTE da api

nfe.ambiente=${AMBIENTE:test}

# S3 AWS
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=test
quarkus.s3.aws.credentials.static-provider.secret-access-key=test

# S3 Bucket
quarkus.s3.devservices.buckets=nfe-processing-bucket
quarkus.s3.path-style-access=true
quarkus.s3.endpoint-override=http://localhost:4566
quarkus.s3.aws.region=sa-east-1
bucket.name=s3-nfe-bucket

## BDD
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:user}
quarkus.datasource.password=${DB_PASSWORD:1234}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/nfe-processing}
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.devservices.enabled=false

